<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart IoT System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Smart IoT Dashboard</h1>
    <p>Internet of Things Project using ESP32</p>
</header>

<section class="container">

    <div class="card">
        <h2>Temperature</h2>
        <h3 id="temp">28°C</h3>
    </div>

    <div class="card">
        <h2>Humidity</h2>
        <h3 id="humidity">60%</h3>
    </div>

    <div class="card">
        <h2>Device Status</h2>
        <button id="btn">Turn ON</button>
    </div>

</section>

<script src="script.js"></script>

</body>
</html>
