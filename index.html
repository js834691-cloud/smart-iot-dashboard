<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Manvi ❤️</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<!-- Animated Background -->
<div id="stars"></div>
<div id="flowers"></div>
<div id="balloons"></div>

<!-- Floating Hearts -->
<div id="heart-container"></div>

<!-- Teddy -->
<img src="https://cdn-icons-png.flaticon.com/512/3069/3069172.png"
class="teddy left">

<img src="https://cdn-icons-png.flaticon.com/512/3069/3069172.png"
class="teddy right">

<!-- Main Card -->

<div class="card">

<h1 id="title">
<span>M</span>
<span>a</span>
<span>n</span>
<span>v</span>
<span>i</span>

<br>

<span class="surname">S</span>
<span class="surname">h</span>
<span class="surname">a</span>
<span class="surname">r</span>
<span class="surname">m</span>
<span class="surname">a</span>

</h1>

<h2 class="subtitle">
💙 Our Friendship Means Everything 💙
</h2>

<p id="message"></p>

<button id="showMessage">
Open My Heart ❤️
</button>

</div>

<!-- Music Button -->

<button id="musicBtn">
🎵 Music
</button>

<!-- Hidden Music -->
<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
